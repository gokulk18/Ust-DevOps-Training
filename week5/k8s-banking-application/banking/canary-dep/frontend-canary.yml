apiVersion: v1
kind: ConfigMap
metadata:
  name: fcm
  namespace: banking-app
data:
  USER_URL: "/api/user"
  ACCOUNT_URL: "/api/account"
  TX_URL: "/api/tx"
  LOAN_URL: "/api/loan"
  REPORT_URL: "/api/report"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-v1
  namespace: banking-app
spec:
  replicas: 2   
  selector:
    matchLabels:
      app: frontend
      version: v1
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
      - name: f1
        image: thamizhanm3/bank-frontend:v1
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: fcm
        ports:
        - containerPort: 80
        startupProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-v2
  namespace: banking-app
spec:
  replicas: 1   
  selector:
    matchLabels:
      app: frontend
      version: v2
  template:
    metadata:
      labels:
        app: frontend
        version: v2
    spec:
      containers:
      - name: f1
        image: thamizhanm3/bank-frontend:v1
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        envFrom:
        - configMapRef:
            name: fcm
        ports:
        - containerPort: 80
        startupProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          failureThreshold: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: banking-app
spec:
  type: ClusterIP
  selector:
    app: frontend   
  ports:
  - port: 80
    targetPort: 80
