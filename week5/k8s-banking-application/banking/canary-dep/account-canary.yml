apiVersion: v1
kind: Secret
metadata:
  name: account-secret
  namespace: banking-app
stringData:
  DB_HOST: "mysql"
  DB_USER: "root"
  DB_PASS: "rootpassword"
  DB_NAME: "banking_db"
  REDIS_HOST: "redis"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: account-config
  namespace: banking-app
data:
  PORT: "3002"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-v1
  namespace: banking-app
spec:
  replicas: 2  
  selector:
    matchLabels:
      app: account
      version: v1
  template:
    metadata:
      labels:
        app: account
        version: v1
    spec:
      containers:
        - name: account
          image: yaswanthreddy1602/account-service:v1
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: account-secret
            - configMapRef:
                name: account-config
          startupProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-v2
  namespace: banking-app
spec:
  replicas: 1   
  selector:
    matchLabels:
      app: account
      version: v2
  template:
    metadata:
      labels:
        app: account
        version: v2
    spec:
      containers:
        - name: account
          image: yaswanthreddy1602/account-service:v1
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - containerPort: 3002
          envFrom:
            - secretRef:
                name: account-secret
            - configMapRef:
                name: account-config
          startupProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: banking-app
spec:
  selector:
    app: account   
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
