apiVersion: v1
kind: ConfigMap
metadata:
  name: fraud-detection-config
  namespace: banking-app
data:
  MQ_URL: "amqp://rabbitmq"
  PORT: "3007"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-v1
  namespace: banking-app
spec:
  replicas: 2   
  selector:
    matchLabels:
      app: fraud-detection
      version: v1
  template:
    metadata:
      labels:
        app: fraud-detection
        version: v1
    spec:
      containers:
        - name: fraud-detection
          image: yaswanthreddy1602/fraud-detection-service:v1
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - containerPort: 3007
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          startupProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-v2
  namespace: banking-app
spec:
  replicas: 1   
  selector:
    matchLabels:
      app: fraud-detection
      version: v2
  template:
    metadata:
      labels:
        app: fraud-detection
        version: v2
    spec:
      containers:
        - name: fraud-detection
          image: yaswanthreddy1602/fraud-detection-service:v1
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
          ports:
            - containerPort: 3007
          envFrom:
            - configMapRef:
                name: fraud-detection-config
          startupProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata: 
  name: fraud-detection-service
  namespace: banking-app
spec:
  selector:
    app: fraud-detection   
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
