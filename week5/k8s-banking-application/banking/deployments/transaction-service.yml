apiVersion: v1
kind: Secret
metadata:
  name: transaction-secret
  namespace: banking-app
stringData:
  DB_HOST: "mysql"
  DB_USER: "root"
  DB_PASS: "rootpassword"
  DB_NAME: "banking_db"
  REDIS_HOST: "redis"
  MQ_URL: "amqp://rabbitmq"
 
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: transaction-config
  namespace: banking-app
data:
  PORT: "3003"
 
---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: transaction
  namespace: banking-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: transaction
  template:
    metadata:
      labels:
        app: transaction
    spec:
      containers:
        - name: transaction
          image: yaswanthreddy1602/transaction-service:v1
          ports:
            - containerPort: 3003
          envFrom:
            - secretRef:
                name: transaction-secret
            - configMapRef:
                name: transaction-config
          startupProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: transaction-service
  namespace: banking-app
spec:
  selector:
    app: transaction
  ports:
    - port: 3003
      targetPort: 3003
  type: ClusterIP
