apiVersion: v1
kind: ConfigMap
metadata:
  name: config-service-config
  namespace: banking-app
data:
  PORT: "3008"
 
---
 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-deployment
  namespace: banking-app
 
spec:
 
  replicas: 2
 
  selector:
    matchLabels:
      app: config-app
 
  template:
    metadata:
      labels:
        app: config-app
 
    spec:
      containers:
        - name: config-container
          image: yaswanthreddy1602/config-service:v1
          envFrom:
            - configMapRef:
                name: config-service-config
          ports:
            - containerPort: 3008
          startupProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 5
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
 
---
 
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: banking-app
 
spec:
 
  type: ClusterIP
 
  selector:
    app: config-app
 
  ports:
    - port: 3008
      targetPort: 3008
