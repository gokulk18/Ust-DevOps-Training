apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: banking-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-app
  template:
    metadata:
      labels:
        app: rabbitmq-app
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine

        ports:
        - containerPort: 5672   # AMQP
        - containerPort: 15672  # UI

        volumeMounts:
        - name: rabbitmq-storage
          mountPath: /var/lib/rabbitmq
        startupProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 20
          failureThreshold: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 6
          timeoutSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 5672
          initialDelaySeconds: 60
          periodSeconds: 20
          failureThreshold: 6
          timeoutSeconds: 5

  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-storage
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: nfs-client
      resources:
        requests:
          storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: banking-app
spec:
  clusterIP: None
  selector:
    app: rabbitmq-app
  ports:
  - name: amqp
    port: 5672
    targetPort: 5672

  - name: management
    port: 15672
    targetPort: 15672
