apiVersion: apps/v1
kind: Deployment
metadata:
  name: mono-deployment
  labels:
    app: mono-app

spec: 
  replicas: 3

  selector:
    matchLabels:
      app: mono-app
  
  template:
    metadata:
      labels:
        app:  mono-app

    spec:
      containers:
        - name: mono-container
          image: cazzzzz/mono-withstage
          ports:
            - containerPort: 8080  
